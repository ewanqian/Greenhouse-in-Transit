name: Deploy Public Pages

on:
  push:
    branches:
      - main
    paths:
      - "mg17-intake.html"
      - "Archive/archive-viewer-v2.html"
      - "assets/greenhouse-botanical-mark.svg"
      - "assets/mg17-evidence-board.png"
      - "assets/video/mistgarden-opening.mov"
      - "assets/models/usdz/mistgarden-case.usdz"
      - "assets/models/glb/mistgarden-case.glb"
      - "scripts/build_public_docs_bundle.sh"
      - "04-production/MG-17/09-public-boundary/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build clean public docs bundle
        run: bash ./scripts/build_public_docs_bundle.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
