<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>箱中温室 — 档案查看器 V2</title>
<style>
:root{--bg:#0a0d10;--panel:#12171d;--panel-2:#0f1318;--line:#232a33;--text:#eef3f7;--muted:#9ea8b6;--accent:#7ab7ff;--accent2:#6cf074}
*{box-sizing:border-box} 
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
a{color:var(--accent);text-decoration:none}

/* 主容器 - 上下分屏 */
.app{display:flex;flex-direction:column;height:100vh}

/* 上半部分 - 内容展示区 */
.viewer{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.viewer-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--panel-2)}
.viewer-header .brand{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.viewer-header .title{font-size:14px;font-weight:600}
.viewer-content{flex:1;display:flex;overflow:hidden}

/* 中间内容区 */
.content-area{flex:1;padding:32px 40px;overflow-y:auto;background:var(--bg)}
.content-area .headline{margin-bottom:28px}
.content-area .headline h1{margin:0;font-size:42px;line-height:1;letter-spacing:-.03em;font-weight:800}
.content-area .headline .sub{color:var(--muted);margin-top:10px;font-size:16px}
.content-area .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.content-area .meta .box{border:1px solid var(--line);background:var(--panel);padding:14px}
.content-area .meta .label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:6px}
.content-area .meta .value{font-size:14px}
.content-area .lead{font-size:18px;line-height:1.7;color:#dde6ee;max-width:800px;margin-bottom:28px}
.content-area .body-text{max-width:800px}
.content-area .body-text p{margin:0 0 16px;line-height:1.8;color:#c8d4e0}
.content-area .related-tags{margin-top:28px;padding-top:20px;border-top:1px solid var(--line)}
.content-area .related-tags h3{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin:0 0 12px}
.content-area .tag{display:inline-block;padding:8px 14px;border:1px solid var(--line);margin:0 8px 8px 0;font-size:12px;color:var(--accent);background:var(--panel);cursor:pointer;transition:all 0.2s}
.content-area .tag:hover{border-color:var(--accent);background:rgba(122,183,255,0.1)}

/* 右侧信息栏 */
.info-sidebar{width:320px;border-left:1px solid var(--line);background:var(--panel-2);padding:24px;overflow-y:auto}
.info-sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin:0 0 16px}
.info-sidebar .related-card{border:1px solid var(--line);padding:14px;background:var(--panel);margin-bottom:12px;cursor:pointer;transition:all 0.2s}
.info-sidebar .related-card:hover{border-color:var(--accent)}
.info-sidebar .related-card strong{display:block;font-size:14px;margin-bottom:4px}
.info-sidebar .related-card .type{color:var(--muted);font-size:11px;margin-bottom:8px}
.info-sidebar .related-card .summary{color:var(--muted);font-size:12px;line-height:1.6}
.info-sidebar .code{margin-top:24px;padding:16px;border:1px solid var(--line);background:#0c1116;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.8;color:#bcd1ff;white-space:pre-wrap}

/* 下半部分 - 横向词条列表 */
.timeline{height:180px;border-top:1px solid var(--line);background:var(--panel-2);display:flex;flex-direction:column}
.timeline-header{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;border-bottom:1px solid var(--line)}
.timeline-header .label{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}
.timeline-header .controls{display:flex;gap:12px}
.timeline-header .controls button{background:none;border:1px solid var(--line);color:var(--muted);padding:6px 14px;font-size:12px;cursor:pointer;transition:all 0.2s}
.timeline-header .controls button:hover{border-color:var(--accent);color:var(--accent)}
.timeline-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 24px;display:flex;gap:16px;align-items:center}
.timeline-scroll::-webkit-scrollbar{height:6px}
.timeline-scroll::-webkit-scrollbar-track{background:var(--panel)}
.timeline-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.timeline-scroll::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* 词条卡片 - 专辑封面风格 */
.entry-card{flex-shrink:0;width:140px;height:120px;border:1px solid var(--line);background:var(--panel);padding:14px;cursor:pointer;transition:all 0.3s;display:flex;flex-direction:justify-content:space-between;position:relative;overflow:hidden}
.entry-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.entry-card.active{border-color:var(--accent);background:rgba(122,183,255,0.15);box-shadow:0 0 20px rgba(122,183,255,0.2)}
.entry-card .card-type{position:absolute;top:8px;right:8px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:2px 6px;border:1px solid var(--line)}
.entry-card .card-content{display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.entry-card .card-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.2}
.entry-card .card-en{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.entry-card .card-group{position:absolute;top:8px;left:8px;font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}

/* 响应式 */
@media (max-width:1200px){
  .info-sidebar{width:280px}
  .content-area{padding:24px}
  .content-area .headline h1{font-size:32px}
  .content-area .meta{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:900px){
  .app{flex-direction:column}
  .viewer-content{flex-direction:column}
  .info-sidebar{display:none}
  .timeline{height:160px}
  .entry-card{width:120px;height:100px}
}
</style>
</head>
<body>
<div class="app">
  <!-- 上半部分：内容查看器 -->
  <div class="viewer">
    <div class="viewer-header">
      <div class="brand">Archive / Codex V2</div>
      <div class="title">箱中温室 / Greenhouse in Transit</div>
      <a href="../index.html" style="font-size:13px;">返回现场入口</a>
    </div>
    <div class="viewer-content">
      <!-- 中间内容 -->
      <main class="content-area">
        <div id="detail"></div>
      </main>
      
      <!-- 右侧信息 -->
      <aside class="info-sidebar">
        <h3>相关项 / Related</h3>
        <div id="related"></div>
        <div class="code">SYSTEM NOTES
- public shell: SONGJIAN
- holding house: White Isle House
- route network: TIDELINE
- anomaly office: Relay Bureau
- object class: Mistgarden Case MG-17
- public title: Greenhouse in Transit</div>
      </aside>
    </div>
  </div>
  
  <!-- 下半部分：横向词条时间线 -->
  <div class="timeline">
    <div class="timeline-header">
      <div class="label">词条导航 / Entry Navigator</div>
      <div class="controls">
        <button onclick="scrollTimeline(-1)">← 向左</button>
        <button onclick="scrollTimeline(1)">向右 →</button>
      </div>
    </div>
    <div class="timeline-scroll" id="timeline">
      <!-- 词条卡片将通过JS生成 -->
    </div>
  </div>
</div>

<script>
const db=[
  {id:'virtura',group:'系统概览',title:'VIRTURA',en:'Digital Voyage Universe',type:'世界观总纲',status:'半公开',parent:'—',summary:'一个由数字洋流、目的地节点、便携空间舱、错投机制与现实侵入事件共同构成的开放宇宙。',body:['在这套世界里，空间不是固定背景，而是可以被封存、运输、复制和重新认领的对象。','赛尼亚岛是一个面向公众开放的停靠节点；而《箱中温室》则是一件让这个世界以失物形式侵入现实的异常证物。'],related:['songjian','senja','mistgarden']},
  {id:'current',group:'系统概览',title:'数字洋流',en:'Digital Current',type:'底层媒介',status:'内部',parent:'VIRTURA',summary:'旅客、记忆、舱体与目的地之间发生迁移的底层流动媒介。',body:['数字洋流不是一个机构，而是一种更接近"海流 + 网络 + 空间缓冲层"的存在。','潮线依附其上运行，转栈署则处理其中出现的异常错投。'],related:['tideline','relay','mistgarden']},
  {id:'tideline',group:'机构档案',title:'潮线',en:'TIDELINE',type:'航行网络',status:'半深层',parent:'数字洋流',summary:'负责旅客接驳、目的地通行、便携舱体运输与路线维护的航行网络。',body:['它在世界观中的位置更像一条被品牌化的航运系统，而不是充满 lore 的神秘机关。','对于观众来说，潮线最常以票据、通行信息、节点时间和运输记录的形式出现。','潮线网络建立于数字洋流的稳定层，主要航行于赛尼亚岛、白屿港、雾岛礁等节点之间。','标准客运航线单程航行时间约为48-72小时，物流航线则根据货物类型有所不同。','主要业务包括：数字空间客运、便携舱体运输、环境记忆转移、数据包裹递送。'],related:['ticket','senja','mistgarden','misdelivery']},
  {id:'relay',group:'机构档案',title:'转栈署',en:'Relay Bureau',type:'异常机构',status:'内部',parent:'—',summary:'处理错投物、未完成中转、失物登记、回收记录与异常警示的系统部门。',body:['转栈署是这套世界里最适合留下文件痕迹的机构。','在 ARG 层面，它可以通过认领通知、回收警示、状态更新和失败记录慢慢暴露自身存在。','主要职能：异常货物处理、信息栈管理、数字内容具象化异常管理、错投事件追踪。','常用术语：数据流异常、具象化泄露、现实侵入、航线偏移、包裹逃逸。'],related:['mistgarden','ticket','passenger','misdelivery']},
  {id:'whiteisle',group:'机构档案',title:'白屿会',en:'White Isle House',type:'持有母体',status:'半公开',parent:'—',summary:'赛尼亚岛及其相关目的地系统背后的持有、策划与长期维护母体。',body:['它比"集团"更像一个安静但权力稳定的背景实体：既持有目的地，也决定空间风格和长期策略。','公众不会频繁直接接触它，但在正式页面、白皮书、合作物料和岛屿背景里，它是不可忽视的名字。'],related:['songjian','senja','archive']},
  {id:'songjian',group:'机构档案',title:'松间',en:'SONGJIAN',type:'旅居品牌',status:'公开',parent:'白屿会',summary:'赛尼亚岛数字旅居地对外的品牌名称，负责风格、地图、空间说明与旅居叙述。',body:['"松间"只保留为一个单名品牌，不再附加"目的地""集团"等功能性后缀。','它更像一套能被感知、停留、带走记忆的旅居语气，而不是单纯运营口径。'],related:['senja','whiteisle','archive']},
  {id:'senja',group:'地点档案',title:'赛尼亚岛',en:'Senja Digital Retreat',type:'目的地节点',status:'公开',parent:'松间',summary:'模拟挪威峡湾景观的虚拟北欧岛屿，是公众最先进入的表层入口。',body:['Minecraft 版本让公众以玩家身份进入地图；而更深层的网页与头显体验则让岛屿开始承担世界观驻泊地的角色。','赛尼亚岛不只是目的地，它也是旅客停靠、记忆缓冲、物件归还和空间暂存的节点。','岛上主要设施：温室模块、数字港口、记忆档案馆、旅居区、中转中心。'],related:['greenhousemodule','mistgarden','ticket']},
  {id:'greenhousemodule',group:'地点档案',title:'温室模块',en:'Greenhouse Module',type:'受限空间',status:'半公开',parent:'赛尼亚岛',summary:'位于赛尼亚岛内部的植物保育与环境缓冲结构，是雾庭舱最可能的原生归属地之一。',body:['这一词条是本轮建议新增的关键补强点。','一旦温室模块存在，雾庭舱就不再像凭空掉出来的独立装置，而像来自岛屿内部体系的一件真实设备。','温室模块负责培育和保存数字植物样本，同时作为环境记忆的存储节点。'],related:['senja','mistgarden','passenger']},
  {id:'mistgarden',group:'物件档案',title:'雾庭舱',en:'Mistgarden Case',type:'便携温室舱',status:'未认领',parent:'赛尼亚岛宇宙',summary:'项目内部真正的物件名。它是一只便携温室舱，用于封存和运输一座微型花园。',body:['对外，项目仍然叫《箱中温室》；对内，这件物就是雾庭舱 MG-17 Portable Conservatory Unit。','它原本属于一位长期驻留旅客，用于保存植物影像、湿度记忆、局部参数和个人化的停留环境；因错投进入现实。','舱体内部封存了一座名为"雾庭"的微型花园，包含多种数字植物样本和环境记忆数据。'],related:['projecttitle','passenger','ticket','climate','utility','misdelivery']},
  {id:'projecttitle',group:'物件档案',title:'箱中温室',en:'Greenhouse in Transit',type:'项目题名',status:'公开',parent:'雾庭舱',summary:'面向公众与策展语境的题名。保留诗性，但不承担装备级识别任务。',body:['这个名字负责把观众吸引到"箱子里真的装着一座温室"这件事上。','装备级识别由"雾庭舱"补足，二者共同构成项目的双层命名。'],related:['mistgarden']},
  {id:'passenger',group:'乘客档案',title:'未公开旅客',en:'Unlisted Passenger',type:'人物',status:'机密',parent:'赛尼亚岛',summary:'雾庭舱原持有者，一位长期驻留于赛尼亚岛的研究型旅客。',body:['其活动痕迹更接近"在北方停留太久的人"，而非宏大英雄角色。','他在现实中的植物园、温室和北方旅行中积累了影像与环境记忆，并把它们整理成一个便携舱体。','旅客身份：植物学研究者，长期驻留在赛尼亚岛温室模块进行数字植物研究。'],related:['mistgarden','ticket','utility']},
  {id:'ticket',group:'物件档案',title:'旅客票据',en:'Voyage Ticket',type:'纸质接口',status:'可复制',parent:'雾庭舱',summary:'最适合被观众带走的现实入口物之一。',body:['票据承担多重作用：旅居感、航行感、现实触感、扫码入口和 ARG 延迟体验。','在系统里，它既可能是潮线的票据，也可能带有转栈署的补记与异常编号。','票据信息：航线从赛尼亚岛出发，目的地为白屿港，预计航行时间72小时。'],related:['tideline','relay','mistgarden']},
  {id:'utility',group:'物件档案',title:'驻留套件',en:'Stay Utility Kit',type:'生活层小物',status:'待制作',parent:'雾庭舱',summary:'包括拖鞋、牙刷、洗漱袋等旅居小物，用于强化"这是某人真实住过、停留过的系统"这一感觉。',body:['它不是装饰性的 props，而是把世界观从"只剩技术和设定"拉回"有人真的住过这里"的生活层。','建议作为现场可见小物出现，并和扫码流程中的提问、票据和气味卡形成互文。'],related:['mistgarden','passenger','scent']},
  {id:'climate',group:'物件档案',title:'参数卡',en:'Climate Card',type:'技术附属物',status:'待制作',parent:'雾庭舱',summary:'记录雾庭舱内局部湿度、温度、光照与植物记忆校准信息的参数卡。',body:['它能提供一点"系统真实感"，但不需要写得过满。','参数卡最好像真实设备随附的校准记录，而不是一张解释世界观的概念海报。'],related:['mistgarden','scent','greenhousemodule']},
  {id:'scent',group:'物件档案',title:'气味卡',en:'Scent Card',type:'感知附属物',status:'待制作',parent:'雾庭舱',summary:'把气味正式纳入体验链路，而不是附会性的装饰。',body:['建议拆成三层：旅居清洁感、温室湿度感、轻微异常冷空气感。','气味卡既可以是现场带走物，也可以在手机端被写入识别问题。'],related:['utility','climate','mistgarden']},
  {id:'misdelivery',group:'事件档案',title:'错投事件',en:'Misdelivery Event',type:'异常事件',status:'未结案',parent:'转栈署',summary:'雾庭舱没有按预定路径返回赛尼亚岛，而是在复制或中转过程中掉入现实。',body:['这是整个项目最核心的异常事件，也是连接现实箱体、网页档案和 Vision Pro 体验的关键桥梁。','在对外语境中，它可以保持含糊；在档案查看器中，则可以逐步补上时间、地点和未确认部分。','事件经过：雾庭舱在潮线网络的中转过程中遭遇数字洋流风暴，导致航线偏移，最终发生具象化泄露，落入现实空间。','转栈署记录："MG-17 型便携温室舱于航线 S-042 段遭遇数据流异常，疑似发生现实侵入。当前状态：未回收，未确认。"'],related:['relay','mistgarden','passenger','tideline']},
  {id:'archive',group:'媒介入口',title:'档案查看器',en:'Archive Viewer',type:'数据库阅读器',status:'原型',parent:'网站B',summary:'承接深层设定、组织结构、物件、事件与假官网层的入口。',body:['它更像游戏 codex 和内部数据库，不像传统展示网页。','后续所有词条、认领流程、失物记录和手机端深链都应汇入这里。'],related:['relay','mistgarden']}
];

let currentId='mistgarden';
const detail=document.getElementById('detail');
const related=document.getElementById('related');
const timeline=document.getElementById('timeline');

function renderDetail(){
  const item=db.find(x=>x.id===currentId);
  detail.innerHTML=`
    <div class="headline">
      <h1>${item.title}</h1>
      <div class="sub">${item.en} / ${item.type}</div>
    </div>
    <div class="meta">
      <div class="box"><div class="label">类型</div><div class="value">${item.type}</div></div>
      <div class="box"><div class="label">状态</div><div class="value">${item.status}</div></div>
      <div class="box"><div class="label">上级</div><div class="value">${item.parent}</div></div>
      <div class="box"><div class="label">ID</div><div class="value">${item.id.toUpperCase()}</div></div>
    </div>
    <div class="lead">${item.summary}</div>
    <div class="body-text">${item.body.map(p=>`<p>${p}</p>`).join('')}</div>
    <div class="related-tags">
      <h3>关联词条</h3>
      ${item.related.map(id=>{
        const r=db.find(x=>x.id===id);
        return r?`<span class="tag" onclick="selectEntry('${id}')">${r.title}</span>`:'';
      }).join('')}
    </div>
  `;
}

function renderRelated(){
  const item=db.find(x=>x.id===currentId);
  related.innerHTML=item.related.map(id=>{
    const r=db.find(x=>x.id===id);
    if(!r)return '';
    return `<div class="related-card" onclick="selectEntry('${r.id}')">
      <strong>${r.title}</strong>
      <div class="type">${r.type}</div>
      <div class="summary">${r.summary.substring(0,60)}...</div>
    </div>`;
  }).join('');
}

function renderTimeline(){
  timeline.innerHTML=db.map(item=>{
    return `<div class="entry-card ${item.id===currentId?'active':''}" onclick="selectEntry('${item.id}')">
      <div class="card-group">${item.group}</div>
      <div class="card-type">${item.type}</div>
      <div class="card-content">
        <div class="card-title">${item.title}</div>
        <div class="card-en">${item.en}</div>
      </div>
    </div>`;
  }).join('');
  
  // 滚动到当前选中的卡片
  setTimeout(()=>{
    const activeCard=timeline.querySelector('.entry-card.active');
    if(activeCard){
      activeCard.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    }
  },100);
}

function selectEntry(id){
  currentId=id;
  renderAll();
}

function renderAll(){
  renderDetail();
  renderRelated();
  renderTimeline();
}

function scrollTimeline(direction){
  const scrollAmount=300;
  timeline.scrollBy({left:direction*scrollAmount,behavior:'smooth'});
}

// 键盘导航
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')scrollTimeline(-1);
  if(e.key==='ArrowRight')scrollTimeline(1);
});

renderAll();
</script>
</body>
</html>
